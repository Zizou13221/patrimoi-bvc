name: CI — Vérification scraper

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-scraper:
    name: Lint & syntaxe Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Installer dépendances
        run: pip install -r scripts/requirements.txt

      - name: Vérifier syntaxe scrape_lematin.py
        run: python -m py_compile scripts/scrape_lematin.py && echo "✓ scrape_lematin.py OK"

      - name: Vérifier syntaxe scrape_or.py
        run: python -m py_compile scripts/scrape_or.py && echo "✓ scrape_or.py OK"

      - name: Vérifier JSON BVC (si présent)
        run: |
          if [ -f bvc_cours.json ]; then
            python -c "import json; d=json.load(open('bvc_cours.json')); print(f'bvc_cours.json valide ✓ — {len(d[\"cours\"])} tickers')"
          else
            echo "bvc_cours.json absent (premier run)"
          fi

      - name: Vérifier JSON Or (si présent)
        run: |
          if [ -f or_prix.json ]; then
            python -c "import json; d=json.load(open('or_prix.json')); print(f'or_prix.json valide ✓ — {d[\"prixOr\"]} DH/g')"
          else
            echo "or_prix.json absent (premier run)"
          fi
