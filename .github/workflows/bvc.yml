name: BVC Cours Update

on:
  schedule:
    # Lundi–Vendredi à 15h00 UTC = 16h00 Maroc (30 min après clôture BVC à 15h30)
    # + passage toutes les heures de 9h à 15h UTC pendant la séance
    - cron: '0 9-15 * * 1-5'

  # Déclenchement manuel depuis GitHub Actions
  workflow_dispatch:

jobs:
  update-bvc:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write   # nécessaire pour git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Installer dépendances
        run: pip install -r scripts/requirements.txt

      - name: Scraper BVC (lematin.ma — 1 requête, tous les tickers)
        run: python scripts/scrape_lematin.py --output bvc_cours.json
        # Garde le JSON précédent en fallback si lematin est indisponible
        continue-on-error: true

      - name: Vérifier que le JSON est valide
        run: python -c "import json; d=json.load(open('bvc_cours.json')); print(f'JSON valide ✓ — {len(d[\"cours\"])} tickers')"

      - name: Commit & push si changements
        run: |
          git config user.name  "patrimoi-bot"
          git config user.email "bot@patrimoi.app"
          git add bvc_cours.json
          if git diff --staged --quiet; then
            echo "Aucun changement à committer."
          else
            git commit -m "chore: BVC update $(date -u '+%Y-%m-%d %H:%M UTC')"
            # Récupère les éventuels commits distants puis rebase nos commits par-dessus
            git pull --rebase origin main
            git push origin main
          fi
